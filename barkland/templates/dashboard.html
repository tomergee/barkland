<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barkland - Multi-Agent Simulation Dash</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: #202124;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --glass-bright: rgba(255, 255, 255, 0.08);
            --google-red: #EA4335;
            --google-blue: #4285F4;
            --google-yellow: #FBBC04;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .font-title {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
        }

        /* Layout */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--google-blue), var(--google-red), var(--google-yellow));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo i {
            font-size: 2rem;
            -webkit-text-fill-color: var(--google-red);
            text-shadow: 0 0 20px rgba(234, 67, 53, 0.4);
        }

        .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
        }

        .btn-start {
            background: linear-gradient(135deg, #34A853 0%, #1e8e3e 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 168, 83, 0.3);
        }

        .btn-start:disabled {
            background: #374151 !important;
            box-shadow: none;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.7;
        }

        .btn-start:hover {
            box-shadow: 0 6px 20px rgba(52, 168, 83, 0.4);
            transform: scale(1.05);
        }

        .btn-stop {
            background: linear-gradient(135deg, #EA4335 0%, #d93025 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(234, 67, 53, 0.3);
        }

        .btn-stop:hover {
            box-shadow: 0 6px 20px rgba(234, 67, 53, 0.4);
            transform: scale(1.05);
        }

        .btn-reset {
            background: linear-gradient(135deg, #4285F4 0%, #357ae8 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        .btn-reset:hover {
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4);
            transform: scale(1.05);
        }

        .btn-reset:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Stats Bar */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-box {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        /* Dogs Grid */
        .grid-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dogs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Custom Scrollbar for Dogs Grid */
        .dogs-grid::-webkit-scrollbar {
            width: 8px;
        }
        .dogs-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }
        .dogs-grid::-webkit-scrollbar-thumb {
            background: rgba(234, 67, 53, 0.2);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dogs-grid::-webkit-scrollbar-thumb:hover {
            background: rgba(234, 67, 53, 0.4);
        }

        .dog-card {
            position: relative;
            overflow: hidden;
            padding: 1rem !important;
        }

        .dog-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .dog-name {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .dog-breed {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Needs circular Pies */
        .needs-container {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            margin-bottom: 0.75rem;
            background: rgba(255,255,255,0.02);
            padding: 8px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .pie-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .pie-chart {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.73rem;
            font-weight: 800;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .pie-chart::before {
            content: '';
            width: 30px;
            height: 30px;
            background: #202124; /* Match body gradient dark inner circle */
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .pie-chart span {
            position: relative;
            z-index: 1;
            font-family: 'Outfit', sans-serif;
            letter-spacing: -0.2px;
        }

        .pie-label {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Latest Bark Message */
        .bark-box {
            background: rgba(234, 67, 53, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            font-style: italic;
            color: #f8f9fa;
            font-size: 0.9rem;
            border-left: 3px solid var(--google-red);
            position: relative;
            transition: all 0.3s ease;
            min-height: 50px;
            display: flex;
            align-items: center;
        }

        @keyframes flashBorder {
            0% { border-color: var(--google-red); box-shadow: 0 0 15px rgba(234, 67, 53, 0.5); background: rgba(234, 67, 53, 0.15); }
            50% { border-color: rgba(255,255,255,0.1); box-shadow: none; background: rgba(255,255,255,0.03); }
            100% { border-color: var(--google-red); box-shadow: 0 0 15px rgba(234, 67, 53, 0.5); background: rgba(234, 67, 53, 0.15); }
        }

        .flash-animation {
            animation: flashBorder 1.2s infinite ease-in-out;
            color: white !important;
        }

        .bark-box::before {
            content: "\f10d";
            font-family: 'FontAwesome';
            position: absolute;
            top: -8px;
            left: 8px;
            font-size: 0.7rem;
            color: var(--google-red);
            opacity: 0.6;
        }

        /* State Animations */
        @keyframes float-zzz {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-12px) scale(1.2); opacity: 0; }
        }

        .anim-sleep::after {
            content: 'Zzz';
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            color: #EA4335;
            font-weight: 800;
            animation: float-zzz 1.8s infinite ease-in-out;
            position: absolute;
            margin-left: 2px;
            top: -6px;
        }

        @keyframes chew-bounce {
            0%, 100% { transform: scale(1) translateY(0); }
            40% { transform: scale(1.15) translateY(-2px) rotate(5deg); }
            60% { transform: scale(0.95) translateY(0) rotate(-3deg); }
        }

        .anim-eat {
            display: inline-block;
            animation: chew-bounce 0.8s infinite ease-in-out;
            color: #34A853;
            transform-origin: center;
        }

        @keyframes bounce-ball {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            40% { transform: translateY(-8px) rotate(20deg); }
            70% { transform: translateY(2px) rotate(-10deg); }
        }

        .anim-play {
            display: inline-block;
            animation: bounce-ball 0.6s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #FBBC04;
        }

        /* Pulse Animation for active simulation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
        }


        /* Terminal styling */
        .terminal-card {
            background: rgba(5, 5, 5, 0.85);
            border-color: rgba(52, 168, 83, 0.25);
            margin-top: 3rem;
            box-shadow: 0 0 30px rgba(52, 168, 83, 0.05);
        }

        .terminal-header {
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .terminal-body {
            font-family: 'Courier New', Courier, monospace;
            color: #34A853;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.03);
            text-shadow: 0 0 5px rgba(74, 222, 128, 0.3);
        }

        .terminal-stat-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            border-bottom: 1px dashed rgba(52, 168, 83, 0.15);
            padding-bottom: 0.8rem;
            font-family: monospace;
        }

        .terminal-log-line {
            line-height: 1.6;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terminal-log-line span.timestamp {
            color: #6b7280;
            font-size: 0.8rem;
        }

        /* Custom Combobox Styles */
        .combobox-dropdown::-webkit-scrollbar {
            width: 6px;
        }
        .combobox-dropdown::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
        }
        .combobox-dropdown::-webkit-scrollbar-thumb {
            background: rgba(234, 67, 53, 0.3);
            border-radius: 3px;
        }
        .combobox-item {
            padding: 9px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
            text-align: center;
        }
        .combobox-item:hover {
            background: rgba(234, 67, 53, 0.15);
            color: white;
        }
        .combobox-item.selected {
            background: rgba(234, 67, 53, 0.35);
            color: white;
            font-weight: 700;
        }
        .split-layout {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }
        .left-pane {
            flex: 1;
            min-width: 0;
        }
        .right-pane {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 50vw;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            transition: transform 0.3s ease;
            transform: translateX(100%);
            padding: 0;
            box-sizing: border-box;
        }
        .right-pane.expanded {
            transform: translateX(0);
        }
        .terminal-handle {
            position: absolute;
            top: 50%;
            left: -40px;
            width: 40px;
            height: 150px;
            background: #EA4335;
            border-radius: 8px 0 0 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateY(-50%);
            color: white;
            box-shadow: -2px 0 5px rgba(0,0,0,0.3);
            padding: 12px 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-dog"></i>
                <span>Barkland</span>
            </div>
            <div class="controls" style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                <div style="display: flex; gap: 12px; align-items: center;">
                    <!-- Counter Input -->
                    <select id="dog-count" title="Select how many agent sandboxes to provision. Agent Sandbox dynamically scales secure, isolated environments for each agent." style="background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.08); font-size: 0.8rem; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s;" onchange="this.blur(); checkDurationLimit();">
                        <option value="1">Agents: 1 Dog</option>
                        <option value="4" selected>Agents: 4 Dogs</option>
                        <option value="10">Agents: 10 Dogs</option>
                        <option value="20">Agents: 20 Dogs</option>
                        <option value="50">Agents: 50 Dogs</option>
                        <option value="99">Agents: 99 Dogs</option>
                        <option value="120">Agents: 120 Dogs</option>
                        <option value="150">Agents: 150 Dogs</option>
                        <option value="200">Agents: 200 Dogs</option>
                    </select>
                    
                    <button class="btn btn-start" title="Start the simulation loop. This provisions Sandbox custom resources via the Orchestrator." onclick="startSim()">
                        <i class="fa-solid fa-play"></i> Start Sim
                    </button>
                    <button class="btn btn-stop" title="Pause the simulation. Agent Sandbox scales down compute for inactive agents to save resources." onclick="stopSim()">
                        <i class="fa-solid fa-pause"></i> Pause Sim
                    </button>
                    <button id="reset-btn" class="btn btn-reset" title="Reset UI components. Only works when simulation is stopped or paused." onclick="resetUI()">
                        <i class="fa-solid fa-arrows-rotate"></i> Reset UI
                    </button>
                </div>
                <select id="duration-select" title="Set the duration for the simulation. Useful for observing fast scale-up and scale-down of isolated agent environments." style="background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.08); font-size: 0.8rem; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif; width: 100%; outline: none;" onchange="this.blur()">
                    <option value="10">Timer: 10 Seconds</option>
                    <option value="30" selected>Timer: 30 Seconds</option>
                    <option value="60">Timer: 60 Seconds</option>
                    <option value="180">Timer: 180 Seconds</option>
                    <option value="0">Timer: Continuous</option>
                </select>
                <!-- Countdown View -->
                <div id="countdown-timer" style="font-size: 0.85rem; color: #EA4335; font-weight: 600; font-family: monospace; display: none; background: rgba(234, 67, 53, 0.1); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(234, 67, 53, 0.2); width: 100%; text-align: center;">
                    <i class="fa-solid fa-stopwatch" style="font-size:0.75rem;"></i> Running: <span id="timer-sec">0</span>s left
                </div>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="glass-card stat-box" title="Simulation tick counter driving the agent state machine. Each tick evaluates the agents' needs.">
                <div class="stat-icon" style="background: rgba(66, 133, 244, 0.15); color: #4285F4;">
                    <i class="fa-solid fa-clock"></i>
                </div>
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.85rem;">Tick Count</div>
                    <div id="tick-val" style="font-size: 1.8rem; font-weight: 800;">0</div>
                </div>
            </div>
            <div class="glass-card stat-box" title="Number of active agent environments running concurrently. Each dog runs in its own secure Kubernetes sandbox.">
                <div class="stat-icon" style="background: rgba(234, 67, 53, 0.15); color: #EA4335;">
                    <i class="fa-solid fa-shield-cat"></i>
                </div>
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.85rem;">Active Dogs</div>
                    <div id="dogs-val" style="font-size: 1.8rem; font-weight: 800;">0</div>
                </div>
            </div>
        </div>

        <div class="split-layout">
            <div class="left-pane">
                <!-- Main Feed -->
                <div>
                    <div class="grid-title">
                        <i class="fa-solid fa-bolt" style="color: var(--google-yellow)"></i>
                        Dashboard Feed
                    </div>
                    <div class="dogs-grid" id="dogs-grid">
                        <!-- Inner dynamic items -->
                    </div>
                </div>
            </div>

            <div class="right-pane" id="terminal-panel">
                <div class="terminal-handle" onclick="toggleTerminal()">
                    <i class="fa-solid fa-chevron-left"></i>
                    <span style="font-size: 0.7rem; font-weight: 700; writing-mode: vertical-rl; text-orientation: mixed; margin-top: 8px; letter-spacing: 0.5px; text-transform: uppercase;">Cluster Monitoring</span>
                </div>
                <!-- Sandbox Terminal Monitor -->
                <div class="terminal-card" id="sandbox-monitor" style="height: 100%; box-sizing: border-box; margin-top: 0; border: none; border-radius: 0; padding: 2rem; display: flex; flex-direction: column;" title="Real-time stream of Kubernetes Sandbox Custom Resources. Watch as isolated environments are dynamically provisioned, paused, and resumed.">
                    <div class="terminal-header">
                        <div class="terminal-dot" style="background: #EA4335;"></div>
                        <div class="terminal-dot" style="background: #FBBC04;"></div>
                        <div class="terminal-dot" style="background: #34A853;"></div>
                        <span style="font-size: 0.85rem; font-weight: 600; color: #94a3b8; font-family: monospace; margin-left: 10px;">
                            <i class="fa-solid fa-code" style="color: #34A853;"></i> Kubernetes Sandbox Claim Controller Stream
                        </span>
                    </div>
                    
                    <div class="terminal-stat-row">
                        <div>Running [ <span id="sb-running" style="color: #34A853; font-weight:800;">0</span> ]</div>
                        <div style="color: rgba(255,255,255,0.2)">|</div>
                        <div>Paused [ <span id="sb-paused" style="color: #FBBC04; font-weight:800;">0</span> ]</div>
                        <div style="color: rgba(255,255,255,0.2)">|</div>
                        <div>Created [ <span id="sb-created" style="color: #4285F4; font-weight:800;">0</span> ]</div>
                    </div>

                    <div class="terminal-body" id="terminal-feed">
                        <div class="terminal-log-line"><span class="timestamp">[19:46:00]</span> Establishing monitor stream...</div>
                        <div class="terminal-log-line"><span class="timestamp">[19:46:01]</span> Sandbox claim tracker online.</div>
                    </div>
                </div>
            </div>
        </div>

    <script>
        function toggleTerminal() {
            const panel = document.getElementById('terminal-panel');
            panel.classList.toggle('expanded');
            const icon = panel.querySelector('.terminal-handle i');
            if (panel.classList.contains('expanded')) {
                icon.className = 'fa-solid fa-chevron-right';
            } else {
                icon.className = 'fa-solid fa-chevron-left';
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Removed combobox initialization logic
        });

        function connectWS() {
            const wsUrl = `ws://${window.location.host}/ws`;
            let ws = new WebSocket(wsUrl);

            ws.onmessage = function(event) {
                if (typeof ignoreWsMessages !== 'undefined' && ignoreWsMessages) return;
                const data = JSON.parse(event.data);
                document.getElementById('tick-val').innerText = data.tick;
                document.getElementById('dogs-val').innerText = data.dogs.length;
                
                // Render Terminal sandboxes
                if (data.sandboxes) {
                    let running = 0, paused = 0, created = 0;
                    const termFeed = document.getElementById('terminal-feed');
                    
                    if (!window.sbStates) window.sbStates = {};
                    data.sandboxes.forEach(sb => {
                        if(sb.status === 'Running') running++;
                        if(sb.status === 'Paused') paused++;
                        if(sb.status === 'Creating' || sb.status === 'Bound') created++;
                        
                        // Only log if status changed to prevent DOM bloating
                        if (window.sbStates[sb.dog_name] !== sb.status) {
                            window.sbStates[sb.dog_name] = sb.status;
                            
                            const timeStr = new Date().toLocaleTimeString();
                            const line = document.createElement('div');
                            line.className = 'terminal-log-line';
                            line.style.marginTop = '4px';
                            let statusColor = '#34A853';
                            if (sb.status === 'Paused') statusColor = '#FBBC04';
                            if (sb.status === 'Creating' || sb.status === 'Bound') statusColor = '#4285F4';

                            line.innerHTML = `<span class="timestamp">[${timeStr}]</span> 
                                <i class="fa-solid fa-cube" style="color: #94a3b8; font-size: 0.8rem;"></i> 
                                <span style="color: #EA4335; font-weight:600;">${sb.dog_name}</span> <i class="fa-solid fa-arrow-right-long" style="font-size: 0.7rem; color: #6b7280;"></i> 
                                <span style="color: #e2e8f0; font-family: monospace;">${sb.claim_name}</span> 
                                <span style="color: #64748b; font-size: 0.75rem; margin-left: 6px; font-family: monospace;">(${sb.ip})</span>
                                [<span style="color: ${statusColor}; font-weight: 600;">${sb.status}</span>]`;
                            
                            termFeed.appendChild(line);
                        }
                    });
                    
                    // Keep only last 200 lines to prevent DOM bloating
                    while (termFeed.childNodes.length > 200) {
                        termFeed.removeChild(termFeed.firstChild);
                    }
                    
                    document.getElementById('sb-running').innerText = running;
                    document.getElementById('sb-paused').innerText = paused;
                    document.getElementById('sb-created').innerText = created;
                    
                    // Auto scroll
                    termFeed.scrollTop = termFeed.scrollHeight;
                }

                const grid = document.getElementById('dogs-grid');
                
                data.dogs.forEach(dog => {
                    let statusColor = '#4285F4';
                    let stateAnim = '';
                    const currentState = dog.state ? dog.state.toUpperCase() : '';
                    if(currentState === 'SLEEPING') {
                        statusColor = '#EA4335';
                        stateAnim = '<i class="fa-regular fa-moon anim-sleep" style="margin-left:8px; font-size:0.9rem; position:relative;"></i>';
                    }
                    if(currentState === 'EATING') {
                        statusColor = '#34A853';
                        stateAnim = '<i class="fa-solid fa-utensils anim-eat" style="margin-left:8px; font-size:0.85rem;"></i>';
                    }
                    if(currentState === 'PLAYING') {
                        statusColor = '#FBBC04';
                        stateAnim = '<i class="fa-solid fa-baseball-bat-ball anim-play" style="margin-left:8px; font-size:0.85rem;"></i>';
                    }

                    let flashClass = '';
                    if (data.tick > 0 && data.tick <= 5) {
                         flashClass = 'flash-animation';
                    }

                    let card = document.getElementById(`dog-card-${dog.name}`);
                    const sb = data.sandboxes ? data.sandboxes.find(s => s.dog_name === dog.name) : null;
                    const claimName = sb ? sb.claim_name : "No Claim";

                    if (!card) {
                        card = document.createElement('div');
                        card.id = `dog-card-${dog.name}`;
                        card.className = `glass-card dog-card ${flashClass}`;
                        card.innerHTML = `
                            <div class="dog-header">
                                <div>
                                    <div class="dog-name"></div>
                                    <div class="dog-breed"></div>
                                </div>
                                <span class="status-badge"></span>
                            </div>

                            <div class="needs-container">
                                <div class="pie-column">
                                    <div class="pie-chart hunger-pie"><span></span></div>
                                    <div class="pie-label">Hunger</div>
                                </div>
                                <div class="pie-column">
                                    <div class="pie-chart energy-pie"><span></span></div>
                                    <div class="pie-label">Energy</div>
                                </div>
                                <div class="pie-column">
                                    <div class="pie-chart boredom-pie"><span></span></div>
                                    <div class="pie-label">Boredom</div>
                                </div>
                            </div>

                            <div class="bark-box"></div>
                        `;
                        grid.appendChild(card);
                    }
                    
                    card.className = `glass-card dog-card ${flashClass}`;
                    
                    let nameStyle = "display:flex; align-items:center;";
                    if (currentState === 'SLEEPING') {
                        nameStyle += " color: #64748b;";
                    }

                    const nameEl = card.querySelector('.dog-name');
                    nameEl.style = nameStyle;
                    nameEl.innerHTML = `${dog.name} ${stateAnim}`;
                    
                    card.querySelector('.dog-breed').innerText = `${dog.breed} - ${claimName}`;
                    
                    const badge = card.querySelector('.status-badge');
                    badge.innerText = dog.state;
                    badge.style.background = `${statusColor}22`;
                    badge.style.color = statusColor;
                    badge.style.border = `1px solid ${statusColor}44`;

                    // Update pie charts
                    const hungerPie = card.querySelector('.hunger-pie');
                    hungerPie.style.background = `conic-gradient(#4285F4 0% ${dog.needs.hunger}%, rgba(255,255,255,0.04) ${dog.needs.hunger}% 100%)`;
                    hungerPie.querySelector('span').innerText = `${Math.round(dog.needs.hunger)}%`;

                    const energyPie = card.querySelector('.energy-pie');
                    energyPie.style.background = `conic-gradient(#EA4335 0% ${dog.needs.energy}%, rgba(255,255,255,0.04) ${dog.needs.energy}% 100%)`;
                    energyPie.querySelector('span').innerText = `${Math.round(dog.needs.energy)}%`;

                    const boredomPie = card.querySelector('.boredom-pie');
                    boredomPie.style.background = `conic-gradient(#FBBC04 0% ${dog.needs.boredom}%, rgba(255,255,255,0.04) ${dog.needs.boredom}% 100%)`;
                    boredomPie.querySelector('span').innerText = `${Math.round(dog.needs.boredom)}%`;

                    // Update bark box
                    const barkBox = card.querySelector('.bark-box');
                    barkBox.innerHTML = data.tick > 0 && data.tick <= 5 
                        ? `<i class="fa-solid fa-wand-magic-sparkles" style="color:var(--google-red); margin-right:6px;"></i> <b>Personality:</b> <span style="text-transform: uppercase; font-weight:800; color: #f8f9fa; margin-left:4px;">${dog.personality.replace('_', ' ')}</span>`
                        : (dog.latest_bark || "Thinking of barking...");
                });
            };

            ws.onclose = function(e) {
                console.log('Socket is closed. Reconnect will be attempted in 1 second.', e.reason);
                setTimeout(function() {
                    connectWS();
                }, 1000);
            };

            ws.onerror = function(err) {
                console.error('Socket encountered error: ', err.message, 'Closing socket');
                ws.close();
            };
        }

        // Start connection
        connectWS();




        function checkDurationLimit() {
            const countVal = parseInt(document.getElementById('dog-count').value) || 4;
            const durationSelect = document.getElementById('duration-select');
            
            if (countVal >= 99) {
                for (let i = 0; i < durationSelect.options.length; i++) {
                    const val = parseInt(durationSelect.options[i].value);
                    if (val > 0 && val < 180) {
                        durationSelect.options[i].disabled = true;
                    }
                }
                const currentVal = parseInt(durationSelect.value);
                if (currentVal > 0 && currentVal < 180) {
                    durationSelect.value = "180";
                }
            } else {
                for (let i = 0; i < durationSelect.options.length; i++) {
                    durationSelect.options[i].disabled = false;
                }
            }
        }

        // Run once on load to establish correct state based on default HTML selection
        window.addEventListener('load', () => { checkDurationLimit(); });

        let simTimeout = null;
        let countdownInterval = null;
        let ignoreWsMessages = false;

        async function startSim() {
            ignoreWsMessages = false;
            document.querySelector('.btn-start').disabled = true;
            const resetBtn = document.getElementById('reset-btn');
            if (resetBtn) resetBtn.disabled = true;
            
            // Extract count from input
            const countVal = parseInt(document.getElementById('dog-count').value) || 4;
            
            if (countVal < 1 || countVal > 200) {
                alert("Please select a dog count between 1 and 200.");
                document.querySelector('.btn-start').disabled = false;
                return;
            }

            const durationSelect = document.getElementById('duration-select');
            const durationVal = parseInt(durationSelect.value);

            if (countVal >= 99 && durationVal > 0 && durationVal < 180) {
                alert("For simulations with 99 or more dogs, the timer must be at least 180 seconds or Continuous.");
                document.querySelector('.btn-start').disabled = false;
                return;
            }
            
            document.getElementById('dogs-grid').innerHTML = '';
            await fetch('/api/simulation/start', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ count: countVal })
            });
            
            if (simTimeout) clearTimeout(simTimeout);
            if (countdownInterval) clearInterval(countdownInterval);
            
            const countdownEl = document.getElementById('countdown-timer');
            const timerSec = document.getElementById('timer-sec');
            const duration = parseInt(document.getElementById('duration-select').value);
            
            if (duration > 0) {
                countdownEl.style.display = 'block';
                let timeLeft = duration;
                timerSec.innerText = timeLeft;

                countdownInterval = setInterval(() => {
                    timeLeft--;
                    timerSec.innerText = timeLeft;
                    if (timeLeft <= 0) clearInterval(countdownInterval);
                }, 1000);

                const termFeed = document.getElementById('terminal-feed');
                if (termFeed) {
                    const ln = document.createElement('div');
                    ln.className = 'terminal-log-line';
                    ln.innerHTML = `<span class="timestamp">[${new Date().toLocaleTimeString()}]</span> <i class="fa-solid fa-stopwatch" style="color: #4285F4;"></i> Timer set for <span style="color: #4285F4; font-weight:600;">${duration}s</span>...`;
                    termFeed.appendChild(ln);
                    termFeed.scrollTop = termFeed.scrollHeight;
                }

                simTimeout = setTimeout(() => {
                    stopSim();
                    if (termFeed) {
                        const ln = document.createElement('div');
                        ln.className = 'terminal-log-line';
                        ln.innerHTML = `<span class="timestamp">[${new Date().toLocaleTimeString()}]</span> <i class="fa-solid fa-triangle-exclamation" style="color: #EA4335;"></i> <span style="color: #EA4335; font-weight:600;">Timer expired automatically pausing simulation.</span>`;
                        termFeed.appendChild(ln);
                        termFeed.scrollTop = termFeed.scrollHeight;
                    }
                }, duration * 1000);
            } else {
                countdownEl.style.display = 'none';
            }
        }

        async function stopSim() {
            const startBtn = document.querySelector('.btn-start');
            const resetBtn = document.getElementById('reset-btn');
            startBtn.disabled = true;
            startBtn.style.opacity = '0.5';
            startBtn.style.cursor = 'not-allowed';
            startBtn.innerHTML = '<i class="fa-solid fa-hourglass-half"></i> Replenishing...';
            if (resetBtn) resetBtn.disabled = true;
            
            setTimeout(() => {
                startBtn.disabled = false;
                startBtn.style.opacity = '1';
                startBtn.style.cursor = 'pointer';
                startBtn.innerHTML = '<i class="fa-solid fa-play"></i> Start Sim';
                if (resetBtn) resetBtn.disabled = false;
            }, 5000);
            if (simTimeout) clearTimeout(simTimeout);
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('countdown-timer').style.display = 'none';
            await fetch('/api/simulation/stop', { method: 'POST' });
        }

        function resetUI() {
            const startBtn = document.querySelector('.btn-start');
            if (startBtn.disabled || startBtn.innerText.includes("Replenishing")) {
                alert("Cannot reset UI while simulation is running or replenishing!");
                return;
            }
            
            ignoreWsMessages = true;
            
            // Clear terminal feed
            document.getElementById('terminal-feed').innerHTML = '';
            
            // Clear dogs grid
            document.getElementById('dogs-grid').innerHTML = '';
            
            // Reset tick count
            document.getElementById('tick-val').innerText = '0';
            
            // Reset active dogs count
            document.getElementById('dogs-val').innerText = '0';
            

        }
    </script>
</body>
</html>
