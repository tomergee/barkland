apiVersion: v1
kind: ServiceAccount
metadata:
  name: barkland-orchestrator-sa
  namespace: ${NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: barkland-orchestrator-role
  namespace: ${NAMESPACE}
rules:
  - apiGroups: ["extensions.agents.x-k8s.io"]
    resources: ["sandboxclaims", "sandboxtemplates", "sandboxwarmpools"]
    verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["get", "list", "watch", "patch", "update", "delete"]

  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: barkland-orchestrator-rolebinding
  namespace: ${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: barkland-orchestrator-sa
roleRef:
  kind: Role
  name: barkland-orchestrator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: barkland-orchestrator
  namespace: ${NAMESPACE}
spec:
  strategy:
    type: Recreate
  replicas: 1 # Single orchestrator replica to maintain simulation loop state in memory
  selector:
    matchLabels:
      app: barkland
      component: orchestrator
  template:
    metadata:
      labels:
        app: barkland
        component: orchestrator
    spec:
      serviceAccountName: barkland-orchestrator-sa
      containers:
        - name: orchestrator
          image: ${REGISTRY_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/barkland:latest
          ports:
            - containerPort: 8000
          env:
            - name: SPEED_MS
              value: "1000"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: GEMINI_API_KEY
            # # NOTE: If the above is commented out, it uses Workload Identity (Vertex AI).
            - name: PORT
              value: "8000"
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "2Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: barkland-orchestrator
  namespace: ${NAMESPACE}
spec:
  type: LoadBalancer # Expose externally for Web UI and states streaming
  selector:
    app: barkland
    component: orchestrator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
